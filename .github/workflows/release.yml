name: Release — Build Multi-Platform Binaries

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build all platforms
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags="-s -w" -o dist/the-strongest-link-linux-amd64   ./...
          GOOS=linux   GOARCH=arm64 go build -ldflags="-s -w" -o dist/the-strongest-link-linux-arm64   ./...
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/the-strongest-link-windows-amd64.exe ./...
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-s -w" -o dist/the-strongest-link-darwin-amd64  ./...
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-s -w" -o dist/the-strongest-link-darwin-arm64  ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "The Strongest Link ${{ github.ref_name }}"
          body: |
            ## The Strongest Link — People Security Risk Management (PSRM)
            **Release:** ${{ github.ref_name }}

            ### Download Binaries
            | Platform | Architecture | File |
            |---|---|---|
            | Linux | amd64 | `the-strongest-link-linux-amd64` |
            | Linux | arm64 | `the-strongest-link-linux-arm64` |
            | Windows | amd64 | `the-strongest-link-windows-amd64.exe` |
            | macOS | Intel | `the-strongest-link-darwin-amd64` |
            | macOS | Apple Silicon | `the-strongest-link-darwin-arm64` |

            ### Run via Docker
            ```bash
            docker pull ghcr.io/kholiffaiz/the-strongest-link-psrm:${{ github.ref_name }}
            docker run -p 3333:3333 ghcr.io/kholiffaiz/the-strongest-link-psrm:${{ github.ref_name }}
            ```
          files: dist/*
